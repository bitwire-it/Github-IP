name: Get and Save GitHub IPs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  get_and_commit_ips:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch and Filter GitHub Meta IPs
        shell: bash
        run: |
          # 1. Create a Python script to handle subnet collapsing.
          # It parses every token as an IP network (IPv4 or IPv6), skips
          # anything that isn't one, and collapses each address family
          # separately (removing contained subnets and merging adjacent ones).
          cat << 'EOF' > collapse_ips.py
          import sys
          import ipaddress

          # Read whitespace-separated tokens from stdin
          tokens = sys.stdin.read().split()

          # Parse valid IP networks (both IPv4 and IPv6). Anything that isn't a
          # network raises ValueError and is skipped.
          v4 = []
          v6 = []
          for token in tokens:
              token = token.strip()
              if not token:
                  continue
              try:
                  net = ipaddress.ip_network(token, strict=False)
              except ValueError:
                  continue
              if isinstance(net, ipaddress.IPv4Network):
                  v4.append(net)
              else:
                  v6.append(net)

          # collapse_addresses() requires a single address family, so collapse
          # each separately. It deduplicates, drops contained subnets, merges
          # adjacent ranges, and returns them in ascending (deterministic) order.
          for net in ipaddress.collapse_addresses(v4):
              print(str(net))
          for net in ipaddress.collapse_addresses(v6):
              print(str(net))
          EOF

          # 2. Fetch the meta data and pull IPs from GitHub's own service
          # endpoints only. We deliberately EXCLUDE actions/dependabot/copilot:
          # those are egress IPs of ephemeral, cloud-hosted runners sitting on
          # shared Azure ranges where abuse is also hosted, so they must not go
          # into an allowlist/exclusion feed. Fields may be null or missing, so
          # keep only string entries before parsing.
          curl -fsSL --retry 3 --retry-delay 5 "https://api.github.com/meta" | jq -r '
            [
              .hooks,
              .web,
              .api,
              .git,
              .github_enterprise_importer,
              .packages,
              .pages,
              .importer
            ] |
            flatten |
            map(select(type == "string")) |
            unique |
            .[]
          ' | python3 collapse_ips.py > github_ip_list.txt

          # 3. Clean up script
          rm collapse_ips.py

          # 4. Sanity check: never commit an empty list (e.g. on a bad API response)
          if [ ! -s github_ip_list.txt ]; then
            echo "::error::Generated IP list is empty, refusing to commit."
            exit 1
          fi

          # Debug output to verify content length in logs
          echo "Generated IP list with $(wc -l < github_ip_list.txt) entries."

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Automated update of GitHub IP list
          file_pattern: github_ip_list.txt
          # The action automatically handles "No changes to commit" scenarios
